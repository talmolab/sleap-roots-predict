# Build (and on main/release, push) the GHCR service image.
name: Docker Build and Push

on:
  push:
    branches: [main]
  release:
    types:
      - published
  pull_request:
    paths:
      - "sleap_roots_predict/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  docker:
    name: Build and push GHCR image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we actually push (skipped on pull_request builds).
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      # The linux_cuda image pulls multi-GB CUDA torch wheels; reclaim runner disk
      # so the build fits ubuntu-latest (~14 GB free otherwise).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL
          df -h

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Build-only on PRs (validate the Dockerfile); build + push on main / release / dispatch.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake the build git sha into the image (ARG -> ENV -> manifest predict_code_sha).
          # The type=sha,format=long tag == this value, so A4 pins an unambiguous reference.
          build-args: |
            SRP_PREDICT_CODE_SHA=${{ github.sha }}
          cache-from: type=gha
          # mode=min (not max): the multi-GB CUDA layers would overflow GitHub's 10 GB cache.
          cache-to: type=gha,mode=min
